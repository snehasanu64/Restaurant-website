<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donne Biryani House | Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <img src="logo .png" alt="Biryani House Logo">
                <span>Biryani House</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="order.html" class="active">Order</a></li>
            </ul>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <h2 class="section-title"><span>Your Selection</span>Review Your Order</h2>
            
            <div class="order-card">
                <div id="cartSummary" class="cart-items">
                    <!-- Cart items will be injected here -->
                </div>

                <form id="orderForm" onsubmit="placeOrder(event)">
                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" class="form-input" id="customerName" placeholder="E.g. Priya Sharma" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Phone Number *</label>
                        <input type="tel" class="form-input" id="customerPhone" placeholder="9843xxxxx" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Delivery Address *</label>
                        <textarea class="form-textarea" id="customerAddress" rows="4" placeholder="House No, Street, Jayanagar, Bengaluru - 560011" required></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Special Instructions</label>
                        <textarea class="form-textarea" id="specialNotes" rows="2" placeholder="Extra spicy / No onions / Extra raita"></textarea>
                    </div>
                    <button type="submit" class="order-btn" id="orderButton" disabled>🚀 Confirm Order (₹0)</button>
                </form>
                
                <div style="text-align: center; margin-top: 2rem;">
                    <a href="menu.html" style="color: var(--text-main); text-decoration: none; font-weight: 600;">← Back to Menu</a>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <h2 style="color: var(--primary); margin-bottom: 1rem;">Biryani House</h2>
            <p style="margin-bottom: 1.5rem;">Authentic Bangalore Street Food | 25+ Years Legacy | Served in Traditional Leaf Donne</p>
            <p>© 2026 Chickpet Donne Biryani House | Jayanagar 9th Block, Bengaluru</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        function updateCart() {
            const summary = document.getElementById('cartSummary');
            const orderButton = document.getElementById('orderButton');
            
            if (!cart || cart.length === 0) {
                summary.innerHTML = `
                    <div style="text-align: center; padding: 2rem;">
                        <span style="font-size: 4rem;">🛒</span>
                        <h3 style="margin-top: 1rem; color: var(--text-main);">Your cart is empty</h3>
                        <p style="color: var(--text-muted); margin-bottom: 2rem;">Looks like you haven't added anything yet.</p>
                        <a href="menu.html" class="cta-btn">Go to Menu</a>
                    </div>
                `;
                orderButton.disabled = true;
                orderButton.textContent = '🚀 Confirm Order (₹0)';
                return;
            }

            let total = 0;
            let itemsHtml = '';
            cart.forEach(item => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                itemsHtml += `
                    <div class="cart-item">
                        <div>
                            <strong style="font-size: 1.1rem; color: var(--text-main);">${item.name}</strong><br>
                            <small style="color: var(--text-muted);">₹${item.price} x ${item.qty}</small>
                        </div>
                        <div style="text-align: right;">
                            <span style="font-weight: 800; color: var(--accent); font-size: 1.2rem; display: block; margin-bottom: 5px;">₹${itemTotal}</span>
                            <div style="display: flex; gap: 10px; align-items: center; justify-content: flex-end;">
                                <button class="qty-btn-menu" onclick="updateQty('${item.name}', -1)">−</button>
                                <span style="font-weight: 700; color: var(--text-main);">${item.qty}</span>
                                <button class="qty-btn-menu" onclick="updateQty('${item.name}', 1)">+</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            summary.innerHTML = `
                <h3 style="margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px; color: var(--text-main);">
                    🛒 Your Cart <span style="background: var(--primary); color: white; padding: 2px 10px; border-radius: 50px; font-size: 0.8rem;">${cart.length}</span>
                </h3>
                ${itemsHtml}
                <div style="margin-top: 2rem; padding-top: 2rem; border-top: 2px dashed var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 1.2rem; font-weight: 600; color: var(--text-main);">Grand Total</span>
                    <span style="font-size: 2.2rem; font-weight: 900; color: var(--accent);">₹${total}</span>
                </div>
            `;
            
            orderButton.disabled = false;
            orderButton.textContent = `🚀 Confirm Order (₹${total})`;
        }

        function placeOrder(event) {
            event.preventDefault();
            if (cart.length === 0) return;

            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const address = document.getElementById('customerAddress').value;
            const notes = document.getElementById('specialNotes').value;

            let orderSummary = `🍛 Order Placed Successfully!\n\nCustomer: ${name}\nPhone: ${phone}\n\nTotal Amount: ₹${cart.reduce((s, i) => s + (i.price * i.qty), 0)}\n\nThank you for choosing Donne Biryani House!`;
            
            alert(orderSummary);
            
            cart = [];
            localStorage.removeItem('chickpetCart');
            window.location.href = 'index.html'; // Redirect home after order
        }

        // Initial call
        updateCart();
    </script>
</body>
</html>
